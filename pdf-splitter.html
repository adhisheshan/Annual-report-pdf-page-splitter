<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Page Splitter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.1rem; color: #e94560; font-weight: 700; white-space: nowrap; }

    .upload-label {
      background: #e94560; color: #fff;
      padding: 7px 16px; border-radius: 6px;
      cursor: pointer; font-size: .85rem; font-weight: 600;
      white-space: nowrap;
    }
    .upload-label:hover { background: #c73652; }
    #fileInput { display: none; }

    .page-nav {
      display: flex; align-items: center; gap: 6px;
      background: #0f3460; padding: 5px 10px; border-radius: 6px;
    }
    .page-nav label { font-size: .8rem; color: #aaa; white-space: nowrap; }
    .page-nav input {
      width: 58px; background: #1a1a2e; border: 1px solid #e94560;
      color: #fff; border-radius: 4px; padding: 3px 6px;
      font-size: .85rem; text-align: center;
    }
    .page-nav input:focus { outline: none; border-color: #ff6b6b; }
    #goBtn {
      background: transparent; border: 1px solid #e94560;
      color: #e94560; padding: 3px 10px; border-radius: 4px;
      cursor: pointer; font-size: .8rem; font-weight: 600;
    }
    #goBtn:hover { background: #e94560; color: #fff; }

    .vdiv { width: 1px; height: 26px; background: #0f3460; }

    .btn {
      padding: 6px 13px; border-radius: 6px; border: none;
      cursor: pointer; font-size: .8rem; font-weight: 600;
      white-space: nowrap; transition: all .2s;
    }
    .btn-ol  { background: transparent; color: #aad4f5; border: 1px solid #1a5276; }
    .btn-ol:hover  { background: #1a5276; }
    .btn-inv { background: transparent; color: #f39c12; border: 1px solid #f39c12; }
    .btn-inv:hover { background: #f39c12; color: #000; }
    .btn-dl  { background: #27ae60; color: #fff; }
    .btn-dl:hover  { background: #2ecc71; }
    .btn-preview { background: #2980b9; color: #fff; }
    .btn-preview:hover { background: #3498db; }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    .sel-badge {
      margin-left: auto; background: #0f3460;
      padding: 5px 14px; border-radius: 20px;
      font-size: .8rem; color: #aad4f5; white-space: nowrap;
    }
    .sel-badge strong { color: #e94560; }

    /* ── layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── sidebar ── */
    .sidebar {
      width: 150px; min-width: 150px;
      background: #16213e; border-right: 2px solid #0f3460;
      overflow-y: auto; padding: 8px 6px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar::-webkit-scrollbar { width: 5px; }
    .sidebar::-webkit-scrollbar-track { background: #111; }
    .sidebar::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

    .tcard {
      background: #111; border: 2px solid #2a3a5a;
      border-radius: 5px; overflow: hidden;
      cursor: pointer; position: relative; flex-shrink: 0;
    }
    .tcard:hover  { border-color: #e94560; }
    .tcard.sel    { border-color: #e94560; background: #1a0810; }
    .tcard.cur    { border-color: #27ae60; }
    .tcard.sel.cur { border-color: #f39c12; }

    /* wrapper that holds thumbnail canvas with correct aspect ratio */
    .tcanv-box {
      width: 100%;
      position: relative;
      background: #222;
      overflow: hidden;
    }
    .tcanv-box canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    .tfoot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 3px 5px; font-size: .7rem;
    }
    .tfoot span { color: #999; }
    .tfoot input[type=checkbox] { accent-color: #e94560; width: 14px; height: 14px; cursor: pointer; }

    .tdot {
      position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; background: #e94560;
      border-radius: 50%; display: none;
      align-items: center; justify-content: center;
      font-size: .55rem; color: #fff; font-weight: 700;
    }
    .tcard.sel .tdot { display: flex; }

    /* ── viewer ── */
    .viewer {
      flex: 1;
      overflow-y: auto; overflow-x: hidden;
      padding: 20px 16px;
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      background: #0f0f1a;
    }
    .viewer::-webkit-scrollbar { width: 8px; }
    .viewer::-webkit-scrollbar-track { background: #1a1a2e; }
    .viewer::-webkit-scrollbar-thumb { background: #2a3a5a; border-radius: 4px; }
    .viewer::-webkit-scrollbar-thumb:hover { background: #e94560; }

    .pgcard {
      position: relative;
      border: 3px solid #2a3a5a;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      width: 100%; max-width: 820px;
      flex-shrink: 0;
    }
    .pgcard:hover { border-color: #e94560; }
    .pgcard.sel   { border-color: #e94560; box-shadow: 0 0 18px rgba(233,69,96,.35); }

    /* THIS is the element that establishes height via aspect-ratio */
    .pg-ratio-box {
      position: relative;
      width: 100%;
      background: #1e1e2e;
      overflow: hidden;
    }
    /* canvas fills the ratio box absolutely */
    .pg-ratio-box canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }
    /* Loading label inside the ratio box */
    .pg-loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #444;
      font-size: .85rem;
      pointer-events: none;
    }

    .pg-overlay {
      position: absolute; inset: 0;
      background: rgba(233,69,96,0);
      transition: background .15s;
      pointer-events: none;
      z-index: 2;
    }
    .pgcard.sel .pg-overlay { background: rgba(233,69,96,.07); }

    .pg-lbl {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(10,10,20,.8); color: #ccc;
      font-size: .72rem; padding: 3px 10px; border-radius: 10px;
      pointer-events: none; white-space: nowrap; z-index: 3;
    }
    .pg-tick {
      position: absolute; top: 8px; right: 8px;
      width: 26px; height: 26px;
      background: rgba(15,52,96,.9); border: 2px solid #2a3a5a;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: .85rem; color: transparent;
      pointer-events: none; z-index: 3; transition: all .15s;
    }
    .pgcard.sel .pg-tick { background: #e94560; border-color: #e94560; color: #fff; }

    /* ── empty state ── */
    .empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; color: #444; text-align: center;
      padding: 60px 20px; flex: 1;
    }
    .empty .icon { font-size: 4.5rem; }
    .empty h2 { color: #666; font-size: 1.2rem; }
    .empty p  { font-size: .88rem; line-height: 1.6; max-width: 320px; color: #555; }

    /* ── progress overlay ── */
    #progOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 200;
      align-items: center; justify-content: center;
    }
    #progOverlay.on { display: flex; }
    .prog-box {
      background: #16213e; border: 2px solid #0f3460;
      border-radius: 12px; padding: 30px 44px; text-align: center;
    }
    .prog-box p { margin-top: 12px; color: #aad4f5; font-size: .95rem; }
    .spin {
      width: 44px; height: 44px;
      border: 4px solid #0f3460; border-top-color: #e94560;
      border-radius: 50%; animation: sp .7s linear infinite; margin: 0 auto;
    }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* ── toast ── */
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #27ae60; color: #fff;
      padding: 11px 18px; border-radius: 8px;
      font-size: .88rem; font-weight: 600;
      opacity: 0; transform: translateY(8px);
      transition: all .28s; z-index: 999;
      pointer-events: none; max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.err  { background: #c0392b; }
  </style>
</head>
<body>

<header>
  <h1>PDF Page Splitter</h1>
  <label class="upload-label" for="fileInput">Upload PDF</label>
  <input type="file" id="fileInput" accept=".pdf" />

  <div class="page-nav" id="navBar" style="display:none">
    <label for="gotoInput">Page</label>
    <input type="number" id="gotoInput" min="1" placeholder="—" />
    <span id="ofLbl" style="font-size:.8rem;color:#aaa"></span>
    <button id="goBtn">Go</button>
  </div>

  <div class="vdiv"  id="vdiv"   style="display:none"></div>
  <button class="btn btn-ol"  id="btnAll"  style="display:none">Select All</button>
  <button class="btn btn-ol"  id="btnNone" style="display:none">Deselect All</button>
  <button class="btn btn-inv" id="btnInv"  style="display:none">Invert</button>
  <button class="btn btn-dl"      id="btnDl"      style="display:none" disabled>⬇ Download</button>
  <button class="btn btn-preview" id="btnPreview" style="display:none" disabled>🔍 Open in Tab</button>

  <div class="sel-badge" id="selBadge" style="display:none">
    <strong id="selCount">0</strong> / <span id="totCount">0</span> pages selected
  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="viewer"  id="viewer">
    <div class="empty" id="emptyState">
      <div class="icon">📄</div>
      <h2>No PDF loaded</h2>
      <p>Upload a PDF above. Click any page to select it, then download your selection as a trimmed PDF.</p>
    </div>
  </div>
</div>

<div id="progOverlay">
  <div class="prog-box">
    <div class="spin"></div>
    <p id="progMsg">Loading…</p>
  </div>
</div>
<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── state ─────────────────────────────────────────────────────────────────────
let pdfDoc   = null;
let pdfBytes = null;
let totalPgs = 0;
let selected = new Set();
let pgCards  = [];   // 1-based
let pgRatioBoxes = []; // 1-based — the element that has aspect-ratio set
let pgCanvases   = []; // 1-based — the canvas to paint into
let tCards   = [];   // 1-based thumbnails
let tBoxes   = [];   // 1-based thumb ratio boxes
let tCanvases= [];   // 1-based thumb canvases
let tChks    = [];   // 1-based checkboxes
let rendered = new Set();
let renderScrollTmr;

const SCALE  = 1.4;
const TSCALE = 0.22;

// ── dom ───────────────────────────────────────────────────────────────────────
const $g = id => document.getElementById(id);
const viewer      = $g('viewer');
const sidebar     = $g('sidebar');
const emptyState  = $g('emptyState');
const fileInput   = $g('fileInput');
const navBar      = $g('navBar');
const gotoInput   = $g('gotoInput');
const ofLbl       = $g('ofLbl');
const goBtn       = $g('goBtn');
const vdiv        = $g('vdiv');
const btnAll      = $g('btnAll');
const btnNone     = $g('btnNone');
const btnInv      = $g('btnInv');
const btnDl       = $g('btnDl');
const btnPreview  = $g('btnPreview');
const selBadge    = $g('selBadge');
const selCount    = $g('selCount');
const totCount    = $g('totCount');
const progOverlay = $g('progOverlay');
const progMsg     = $g('progMsg');
const toastEl     = $g('toast');

// ── toast / progress ──────────────────────────────────────────────────────────
let toastTmr;
function toast(msg, err=false) {
  clearTimeout(toastTmr);
  toastEl.textContent = msg;
  toastEl.className = 'show' + (err ? ' err' : '');
  toastTmr = setTimeout(() => toastEl.className='', 3200);
}
function showProg(m) { progMsg.textContent = m; progOverlay.classList.add('on'); }
function hideProg()  { progOverlay.classList.remove('on'); }

// ── load pdf ──────────────────────────────────────────────────────────────────
fileInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.type !== 'application/pdf') { toast('Please select a PDF file.', true); return; }

  showProg('Loading PDF…');
  try {
    pdfBytes = await file.arrayBuffer();
    pdfDoc   = await pdfjsLib.getDocument({ data: pdfBytes.slice(0) }).promise;
    totalPgs = pdfDoc.numPages;
    selected.clear();
    rendered.clear();
    await buildUI();
    showControls();
    toast(`Loaded "${file.name}" — ${totalPgs} page${totalPgs!==1?'s':''}`);
  } catch(err) {
    toast('Failed to load PDF: ' + err.message, true);
    console.error(err);
  } finally {
    hideProg();
    fileInput.value = '';
  }
});

// ── build UI ──────────────────────────────────────────────────────────────────
async function buildUI() {
  viewer.innerHTML  = '';
  sidebar.innerHTML = '';
  pgCards    = [null];
  pgRatioBoxes = [null];
  pgCanvases   = [null];
  tCards     = [null];
  tBoxes     = [null];
  tCanvases  = [null];
  tChks      = [null];

  // Get first page to establish correct aspect ratio for ALL placeholders
  const pg1  = await pdfDoc.getPage(1);
  const vp1  = pg1.getViewport({ scale: SCALE });
  const tvp1 = pg1.getViewport({ scale: TSCALE });
  const W  = Math.round(vp1.width);
  const H  = Math.round(vp1.height);
  const TW = Math.round(tvp1.width);
  const TH = Math.round(tvp1.height);
  // Precompute aspect-ratio strings
  const ratioStr  = `${W} / ${H}`;
  const tratioStr = `${TW} / ${TH}`;

  for (let p = 1; p <= totalPgs; p++) {

    // ── Main card ─────────────────────────────────────────────────────────
    const card = document.createElement('div');
    card.className = 'pgcard';
    card.dataset.page = p;

    // ratio-box: THIS is what gives the card its height
    // aspect-ratio CSS property is the reliable way to maintain proportions
    const ratioBox = document.createElement('div');
    ratioBox.className = 'pg-ratio-box';
    ratioBox.style.aspectRatio = ratioStr;  // <-- KEY: height comes from here

    // Loading text shown until canvas renders
    const loadLbl = document.createElement('div');
    loadLbl.className = 'pg-loading';
    loadLbl.textContent = `Page ${p}`;

    // Canvas is absolute-positioned inside the ratio-box
    const canvas = document.createElement('canvas');
    canvas.width  = W;
    canvas.height = H;

    ratioBox.appendChild(canvas);
    ratioBox.appendChild(loadLbl);

    // UI chrome on top of ratio-box
    const overlay = document.createElement('div'); overlay.className = 'pg-overlay';
    const lbl     = document.createElement('div'); lbl.className = 'pg-lbl'; lbl.textContent = `Page ${p}`;
    const tick    = document.createElement('div'); tick.className = 'pg-tick'; tick.textContent = '✓';

    card.appendChild(ratioBox);
    card.appendChild(overlay);
    card.appendChild(lbl);
    card.appendChild(tick);
    card.addEventListener('click', () => togglePage(p));
    viewer.appendChild(card);

    pgCards.push(card);
    pgRatioBoxes.push(ratioBox);
    pgCanvases.push(canvas);

    // ── Thumbnail ─────────────────────────────────────────────────────────
    const tc   = document.createElement('div');
    tc.className = 'tcard';
    tc.dataset.page = p;

    const dot = document.createElement('div'); dot.className = 'tdot'; dot.textContent = '✓';

    const tbox = document.createElement('div');
    tbox.className = 'tcanv-box';
    tbox.style.aspectRatio = tratioStr;  // same pattern for thumbnail

    const tcanv = document.createElement('canvas');
    tcanv.width  = TW;
    tcanv.height = TH;

    tbox.appendChild(tcanv);

    const foot  = document.createElement('div'); foot.className = 'tfoot';
    const pspan = document.createElement('span'); pspan.textContent = `p.${p}`;
    const chk   = document.createElement('input'); chk.type = 'checkbox';
    chk.addEventListener('click', ev => { ev.stopPropagation(); togglePage(p); });

    foot.appendChild(pspan);
    foot.appendChild(chk);
    tc.appendChild(dot);
    tc.appendChild(tbox);
    tc.appendChild(foot);
    tc.addEventListener('click', () => scrollToPage(p));
    sidebar.appendChild(tc);

    tCards.push(tc);
    tBoxes.push(tbox);
    tCanvases.push(tcanv);
    tChks.push(chk);
  }

  // Start rendering visible pages
  renderVisible();

  // Also render on scroll
  viewer.addEventListener('scroll', () => {
    clearTimeout(renderScrollTmr);
    renderScrollTmr = setTimeout(renderVisible, 60);
  }, { passive: true });
}

// ── render visible pages ──────────────────────────────────────────────────────
function renderVisible() {
  if (!pdfDoc) return;
  const vRect = viewer.getBoundingClientRect();
  const BUFFER = 800; // px above & below viewer to pre-render

  for (let p = 1; p <= totalPgs; p++) {
    if (rendered.has(p)) continue;
    const card = pgCards[p];
    if (!card) continue;
    const r = card.getBoundingClientRect();
    // Is this card within BUFFER px of the viewer's visible area?
    if (r.bottom >= vRect.top - BUFFER && r.top <= vRect.bottom + BUFFER) {
      renderPage(p); // fire-and-forget; errors handled inside
    }
  }
}

// ── render one page ───────────────────────────────────────────────────────────
const activeRenders = new Set();
async function renderPage(p) {
  if (rendered.has(p) || activeRenders.has(p) || !pdfDoc) return;
  activeRenders.add(p);

  try {
    const page = await pdfDoc.getPage(p);

    // ── Main canvas ──
    const vp     = page.getViewport({ scale: SCALE });
    const canvas = pgCanvases[p];
    const box    = pgRatioBoxes[p];

    canvas.width  = Math.round(vp.width);
    canvas.height = Math.round(vp.height);
    // Update aspect-ratio in case page differs from page 1
    box.style.aspectRatio = `${canvas.width} / ${canvas.height}`;

    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

    // Hide the "Page N" loading text once rendered
    const loadLbl = box.querySelector('.pg-loading');
    if (loadLbl) loadLbl.style.display = 'none';

    // ── Thumbnail canvas ──
    const tvp   = page.getViewport({ scale: TSCALE });
    const tcanv = tCanvases[p];
    const tbox  = tBoxes[p];

    tcanv.width  = Math.round(tvp.width);
    tcanv.height = Math.round(tvp.height);
    tbox.style.aspectRatio = `${tcanv.width} / ${tcanv.height}`;

    await page.render({ canvasContext: tcanv.getContext('2d'), viewport: tvp }).promise;

    rendered.add(p);
  } catch(err) {
    console.warn(`Render error page ${p}:`, err);
  } finally {
    activeRenders.delete(p);
  }
}

// ── selection ─────────────────────────────────────────────────────────────────
function togglePage(p) {
  selected.has(p) ? selected.delete(p) : selected.add(p);
  applyVis(p);
  refreshSel();
}
function applyVis(p) {
  const on = selected.has(p);
  pgCards[p]?.classList.toggle('sel', on);
  tCards[p]?.classList.toggle('sel', on);
  if (tChks[p]) tChks[p].checked = on;
}
function refreshSel() {
  selCount.textContent = selected.size;
  btnDl.disabled = selected.size === 0;
  btnPreview.disabled = selected.size === 0;
}

// ── show header controls ──────────────────────────────────────────────────────
function showControls() {
  emptyState.style.display = 'none';
  [navBar, vdiv, btnAll, btnNone, btnInv, btnDl, btnPreview, selBadge].forEach(el => el.style.display = '');
  gotoInput.max = totalPgs;
  ofLbl.textContent = `of ${totalPgs}`;
  totCount.textContent = totalPgs;
  selCount.textContent = 0;
}

// ── navigation ────────────────────────────────────────────────────────────────
function scrollToPage(p) {
  if (p < 1 || p > totalPgs) return;
  pgCards[p]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // Update sidebar active indicator
  for (let i = 1; i <= totalPgs; i++) tCards[i]?.classList.toggle('cur', i === p);
}
goBtn.addEventListener('click', () => {
  const p = parseInt(gotoInput.value);
  if (p >= 1 && p <= totalPgs) scrollToPage(p);
  else toast(`Enter a page between 1 and ${totalPgs}`, true);
});
gotoInput.addEventListener('keydown', e => { if (e.key === 'Enter') goBtn.click(); });

// ── bulk selection ────────────────────────────────────────────────────────────
btnAll.addEventListener('click', () => {
  for (let p=1; p<=totalPgs; p++) { selected.add(p); applyVis(p); }
  refreshSel();
});
btnNone.addEventListener('click', () => {
  selected.clear();
  for (let p=1; p<=totalPgs; p++) applyVis(p);
  refreshSel();
});
btnInv.addEventListener('click', () => {
  for (let p=1; p<=totalPgs; p++) {
    selected.has(p) ? selected.delete(p) : selected.add(p);
    applyVis(p);
  }
  refreshSel();
});

// ── scroll sync: highlight sidebar thumb for most-visible page ────────────────
let syncTmr;
viewer.addEventListener('scroll', () => {
  clearTimeout(syncTmr);
  syncTmr = setTimeout(() => {
    let best = 1, bestVis = -1;
    const vr = viewer.getBoundingClientRect();
    for (let p=1; p<=totalPgs; p++) {
      const r = pgCards[p]?.getBoundingClientRect();
      if (!r) continue;
      const vis = Math.min(r.bottom, vr.bottom) - Math.max(r.top, vr.top);
      if (vis > bestVis) { bestVis = vis; best = p; }
    }
    tCards[best]?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 80);
}, { passive: true });

// ── download ──────────────────────────────────────────────────────────────────
btnDl.addEventListener('click', async () => {
  if (!selected.size) return;
  const sorted = [...selected].sort((a,b) => a-b);
  showProg(`Building PDF — ${sorted.length} page(s)…`);
  try {
    const { PDFDocument } = PDFLib;
    const src    = await PDFDocument.load(pdfBytes);
    const out    = await PDFDocument.create();
    const copied = await out.copyPages(src, sorted.map(p => p - 1));
    copied.forEach(pg => out.addPage(pg));

    const bytes = await out.save();
    const url   = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
    const a     = Object.assign(document.createElement('a'), {
      href: url,
      download: `pages_${sorted[0]}-${sorted[sorted.length-1]}.pdf`
    });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 6000);
    toast(`Downloaded ${sorted.length} page(s)!`);
  } catch(err) {
    toast('Download failed: ' + err.message, true);
    console.error(err);
  } finally {
    hideProg();
  }
});
</script>
</body>
</html>
